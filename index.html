<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Analyseur de Cycle | Iosevka Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Iosevka:wght@300;600&family=Montserrat:wght@400&display=swap"
        rel="stylesheet">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/180/ff6e91/flower-doodle.png">
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluency/180/ff6e91/flower-doodle.png">
    <meta name="theme-color" content="#10101a">
    <meta name="mobile-web-app-capable" content="yes">

    <style>
        :root {
            --bg: #10101a;
            --panel: #16162a;
            --text: #c0c0d0;
            --primary: #ff6e91;
            --ovulation: #a67eff;
            --fertility: #4dd0e1;
            --border: rgba(255, 255, 255, 0.05);
            --font-mono: 'Iosevka', 'Courier New', monospace;
            --font-main: 'Montserrat', sans-serif;
        }

        body {
            font-family: var(--font-main);
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 15px;
            min-height: 100vh;
        }

        .mono {
            font-family: var(--font-mono);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Header / Settings */
        .dashboard {
            width: 100%;
            max-width: 650px;
            text-align: center;
            margin-bottom: 10px;
        }

        .dashboard h1 {
            margin: 0;
            font-size: 1.6em;
            color: var(--primary);
            font-family: var(--font-mono);
        }

        .settings-btn {
            cursor: pointer;
            opacity: 0.5;
            transition: 0.3s;
            font-size: 0.8em;
            margin: 10px 0;
        }

        .settings-btn:hover {
            opacity: 1;
            color: var(--primary);
        }

        .settings-panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            display: none;
            width: 90%;
            max-width: 300px;
            text-align: left;
        }

        .settings-panel label {
            font-size: 0.7em;
            display: block;
            margin-bottom: 5px;
            opacity: 0.8;
        }

        .settings-panel input {
            width: 100%;
            accent-color: var(--primary);
            cursor: pointer;
        }

        /* Layout */
        .main-container {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 700px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .calendar-section {
            background: var(--panel);
            border-radius: 20px;
            padding: 20px;
            flex: 1 1 340px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            color: white;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            cursor: pointer;
            font-family: var(--font-mono);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            text-align: center;
        }

        .day-name {
            font-family: var(--font-mono);
            font-size: 0.7em;
            opacity: 0.3;
            margin-bottom: 8px;
        }

        .day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 10px;
            font-family: var(--font-mono);
            transition: 0.2s;
        }

        .day.selected {
            border: 1px solid var(--primary);
        }

        .day.period {
            background: var(--primary);
            color: #10101a;
            font-weight: bold;
        }

        .day.prediction {
            border: 1px dashed var(--primary);
            background: rgba(255, 110, 145, 0.05);
        }

        .day.fertility {
            color: var(--fertility);
            background: rgba(77, 208, 225, 0.05);
        }

        .day.ovulation {
            border: 1.5px solid var(--ovulation);
        }

        .day.today {
            text-decoration: underline;
            font-weight: bold;
        }

        .analysis-section {
            background: var(--panel);
            border-radius: 20px;
            padding: 20px;
            flex: 0 1 250px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid var(--border);
        }

        /* Disque */
        .cycle-disc-container {
            width: 100%;
            height: 180px;
            position: relative;
            margin: 15px 0;
        }

        .circle-segment {
            transition: stroke-dasharray 0.8s ease, stroke-dashoffset 0.8s ease;
        }

        .cycle-info {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .cycle-info .day-num {
            font-family: var(--font-mono);
            font-size: 3em;
            color: white;
            line-height: 1;
        }

        .cycle-info .label {
            font-size: 0.7em;
            opacity: 0.5;
        }

        .legend-compact {
            width: 100%;
            margin-top: 15px;
            border-top: 1px solid var(--border);
            padding-top: 10px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.7em;
            margin-bottom: 6px;
        }

        .dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
        }
    </style>
</head>

<body>

    <div class="dashboard">
        <h1 class="mono">JOURNAL DU CYCLE</h1>
        <div class="settings-btn mono" onclick="toggleSettings()">⚙ Réglages du cycle</div>

        <div class="settings-panel" id="settings">
            <label class="mono">Durée moyenne du cycle : <span id="cycleVal">28</span> jours</label>
            <input type="range" min="21" max="40" value="28" id="cycleRange" oninput="updateCycleLength(this.value)">
        </div>
    </div>

    <div class="main-container">
        <div class="calendar-section">
            <div class="calendar-header">
                <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
                <h2 class="mono" id="monthDisplay">--</h2>
                <button class="nav-btn" onclick="changeMonth(1)">›</button>
            </div>
            <div class="grid" id="calendarGrid">
                <div class="day-name">LU</div>
                <div class="day-name">MA</div>
                <div class="day-name">ME</div>
                <div class="day-name">JE</div>
                <div class="day-name">VE</div>
                <div class="day-name">SA</div>
                <div class="day-name">DI</div>
            </div>
        </div>

        <div class="analysis-section">
            <h3 class="mono" style="font-size: 0.8em; opacity: 0.7;">Analyse radiale</h3>
            <div class="cycle-disc-container">
                <svg viewBox="0 0 36 36" style="width:100%; height:100%;">
                    <path d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none"
                        stroke="rgba(255,255,255,0.03)" stroke-width="2.5" />
                    <path id="discPeriod" class="circle-segment"
                        d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none"
                        stroke="var(--primary)" stroke-width="2.5" stroke-dasharray="0 100" stroke-linecap="round" />
                    <path id="discFertile" class="circle-segment"
                        d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none"
                        stroke="var(--fertility)" stroke-width="2.5" stroke-dasharray="0 100" stroke-dashoffset="0"
                        stroke-linecap="round" />
                    <path id="discOvulation" class="circle-segment"
                        d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none"
                        stroke="var(--ovulation)" stroke-width="3" stroke-dasharray="0 100" stroke-dashoffset="0"
                        stroke-linecap="round" />
                </svg>
                <div class="cycle-info">
                    <div class="day-num mono" id="cycleDayNum">--</div>
                    <div class="label mono">JOUR</div>
                </div>
            </div>
            <div class="legend-compact">
                <div class="legend-item">
                    <div class="dot" style="background:var(--primary)"></div> <span class="mono">Règles</span>
                </div>
                <div class="legend-item">
                    <div class="dot" style="background:var(--fertility)"></div> <span class="mono">Fertilité</span>
                </div>
                <div class="legend-item">
                    <div class="dot" style="background:var(--ovulation)"></div> <span class="mono">Ovulation</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentDate = new Date();
        let selectedDateStr = formatDate(new Date());
        let trackedDays = JSON.parse(localStorage.getItem('myIosevkaCycle')) || {};
        let cycleLength = parseInt(localStorage.getItem('myCycleLength')) || 28;

        function toggleSettings() {
            const s = document.getElementById('settings');
            s.style.display = s.style.display === 'block' ? 'none' : 'block';
        }

        function updateCycleLength(val) {
            cycleLength = parseInt(val);
            document.getElementById('cycleVal').innerText = val;
            localStorage.setItem('myCycleLength', cycleLength);
            render();
        }

        function render() {
            const grid = document.getElementById('calendarGrid');
            const monthDisplay = document.getElementById('monthDisplay');
            const names = document.querySelectorAll('.day-name');
            grid.innerHTML = ''; names.forEach(n => grid.appendChild(n));

            monthDisplay.innerText = new Intl.DateTimeFormat('fr-FR', { month: 'long', year: 'numeric' }).format(currentDate);

            const lastP = findLastPeriod();
            const preds = calculatePredictions(lastP);
            updateCycleDisc(preds);

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            let offset = firstDay === 0 ? 6 : firstDay - 1;

            for (let i = 0; i < offset; i++) grid.innerHTML += `<div></div>`;

            for (let i = 1; i <= daysInMonth; i++) {
                const dateStr = `${year}-${month + 1}-${i}`;
                let classes = ['day'];
                if (trackedDays[dateStr]?.period) classes.push('period');
                else if (preds.nextPeriod.includes(dateStr)) classes.push('prediction');
                if (preds.fertility.includes(dateStr)) classes.push('fertility');
                if (preds.ovulation === dateStr) classes.push('ovulation');
                if (dateStr === selectedDateStr) classes.push('selected');
                if (dateStr === formatDate(new Date())) classes.push('today');

                grid.innerHTML += `<div class="${classes.join(' ')}" onclick="selectDay('${dateStr}')">${i}</div>`;
            }
        }

        function selectDay(dateStr) {
            selectedDateStr = dateStr;
            if (trackedDays[dateStr]?.period) { delete trackedDays[dateStr].period; }
            else { if (!trackedDays[dateStr]) trackedDays[dateStr] = {}; trackedDays[dateStr].period = true; }
            save(); render();
        }

        function findLastPeriod() {
            const dates = Object.keys(trackedDays).filter(d => trackedDays[d].period).sort((a, b) => new Date(b) - new Date(a));
            return dates.length > 0 ? new Date(dates[0]) : null;
        }

        function calculatePredictions(start) {
            let res = { nextPeriod: [], fertility: [], ovulation: null, currentDayOfCycle: '--' };
            if (!start) return res;

            const diffToday = Math.ceil((new Date().setHours(0, 0, 0, 0) - new Date(start).setHours(0, 0, 0, 0)) / 86400000);
            res.currentDayOfCycle = (diffToday >= 0 && diffToday < cycleLength) ? diffToday + 1 : '--';

            let next = new Date(start);
            next.setDate(start.getDate() + cycleLength);

            for (let i = 0; i < 5; i++) {
                let d = new Date(next); d.setDate(next.getDate() + i);
                res.nextPeriod.push(formatDate(d));
            }

            let ov = new Date(next); ov.setDate(next.getDate() - 14);
            res.ovulation = formatDate(ov);
            for (let i = -3; i <= 1; i++) {
                let d = new Date(ov); d.setDate(ov.getDate() + i);
                res.fertility.push(formatDate(d));
            }
            return res;
        }

        function updateCycleDisc(preds) {
            document.getElementById('cycleDayNum').innerText = preds.currentDayOfCycle;
            const discPeriod = document.getElementById('discPeriod');
            const discFertile = document.getElementById('discFertile');
            const discOvulation = document.getElementById('discOvulation');

            if (preds.currentDayOfCycle === '--') {
                [discPeriod, discFertile, discOvulation].forEach(s => s.setAttribute('stroke-dasharray', '0 100'));
                return;
            }

            // Animation radiale
            discPeriod.setAttribute('stroke-dasharray', `${(5 / cycleLength) * 100} 100`);
            discFertile.setAttribute('stroke-dasharray', `${(5 / cycleLength) * 100} 100`);
            discFertile.setAttribute('stroke-dashoffset', `-${((cycleLength - 17) / cycleLength) * 100}`);
            discOvulation.setAttribute('stroke-dasharray', `1 100`);
            discOvulation.setAttribute('stroke-dashoffset', `-${((14) / cycleLength) * 100}`);
        }

        function formatDate(d) { return `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`; }
        function save() { localStorage.setItem('myIosevkaCycle', JSON.stringify(trackedDays)); }
        function changeMonth(step) { currentDate.setMonth(currentDate.getMonth() + step); render(); }

        // Init
        document.getElementById('cycleRange').value = cycleLength;
        document.getElementById('cycleVal').innerText = cycleLength;
        render();
    </script>
</body>

</html>
